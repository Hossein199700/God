plugins {

    id "com.android.application"

    id "org.jetbrains.kotlin.android"

    id "dev.flutter.flutter-gradle-plugin"

}

android {

    namespace "com.example.mathverse"

    compileSdk 34

    defaultConfig {

        applicationId "com.example.mathverse"

        minSdk 21

        targetSdk 34

        versionCode 1

        versionName "1.0"

    }

    buildTypes {

        release {

            signingConfig signingConfigs.debug

        }

    }

}

flutter {

    source '../..'

}
